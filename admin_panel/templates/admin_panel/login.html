<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Sign In — CaseFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f1923; --cream: #f7f5f0; --amber: #c8820a;
      --border: #e2ddd6; --white: #ffffff; --slate: #4a5568;
      --danger: #c0392b;
      --font-serif: 'Instrument Serif', Georgia, serif;
      --font-sans: 'DM Sans', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans); background: var(--navy);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-box { width: 100%; max-width: 380px; padding: 1rem; }
    .login-brand {
      font-family: var(--font-serif); font-size: 1.8rem; color: var(--white);
      text-align: center; margin-bottom: 0.2rem;
    }
    .login-brand span { color: var(--amber); }
    .login-sub { text-align: center; color: rgba(255,255,255,0.4); font-size: 0.8rem; margin-bottom: 2rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .login-card { background: var(--white); padding: 2rem; }
    .login-card h2 { font-family: var(--font-serif); font-size: 1.2rem; font-weight: 400; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--slate); margin-bottom: 0.35rem; }
    input { width: 100%; padding: 0.6rem 0.875rem; font-family: var(--font-sans); font-size: 0.9rem; border: 1px solid var(--border); outline: none; transition: border-color 0.15s; }
    input:focus { border-color: var(--amber); }
    .btn { display: block; width: 100%; padding: 0.65rem; background: var(--amber); color: var(--white); border: none; font-family: var(--font-sans); font-size: 0.9rem; font-weight: 600; cursor: pointer; text-align: center; transition: background 0.15s; }
    .btn:hover { background: #b5720a; }
    .error { font-size: 0.8rem; color: var(--danger); margin-top: 0.3rem; }
    .non-field-error { background: #fdf0ef; border-left: 3px solid var(--danger); padding: 0.6rem 0.875rem; font-size: 0.8rem; color: var(--danger); margin-bottom: 1rem; }
    .errorlist { list-style: none; }
    .errorlist li { font-size: 0.8rem; color: var(--danger); margin-top: 0.2rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-brand">Case<span>Flow</span></div>
    <div class="login-sub">Admin Panel</div>
<div class="login-card">
  <h2>Staff sign in</h2>
  <form method="POST" novalidate>
    {% csrf_token %}

    <div class="form-group">
      <label>Email</label>
      {{ form.email }}
      {{ form.email.errors }}
    </div>

    <div class="form-group">
      <label>Password</label>
      {{ form.password }}
      {{ form.password.errors }}
    </div>

    {% if form.non_field_errors %}
      <div class="non-field-error">{{ form.non_field_errors }}</div>
    {% endif %}

    <button type="submit" class="btn">Sign In</button>
  </form>
</div>
  </div>
</body>
</html>
